services:
  postgres:
    image: postgres:15
    container_name: airline-reservation-postgres
    environment:
      POSTGRES_DB: airline_reservation_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5437:5432"
    volumes:
      - airline_reservation_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  airline_reservation_postgres_data:
